template:
  inputs:
    var1:
      type: string
      required: true
      default: var1
    var2:
      type: string
      required: true
      default: var2
  stage:
    timeout: <+input>
    steps:
      - run: echo "hello world"
      - id: runStep1
        run: <+input>
      - id: runStep2
        run:
          script: <+input>
        timeout: <+input>
      - id: StepGroup
        action:
          uses: StepGroupProjectV1NestedRemote
          with:
            overlay:
              step:
                group:
                  steps:
                    - run:
                        shell: <+input>
                      id: run
                    - run: <+input>
                      id: run1
                    - run:
                        script: <+input>
                      id: run2
