template:
  inputs:
    var:
      type: string
      required: true
      default: hello
    testing:
      type: string
      required: true
      default: test1
    anotherTesting:
      type: string
      required: true
      default: test1
    variable:
      type: string
      required: true
      default: variable
    testVar:
      type: string
      required: true
      default: testVar
  step:
    group:
      steps:
        - run: echo "hiii"
        - id: run8
          run: <+input>
        - id: runStepTemplate
          action:
            uses: RunStepProjectV1Remote
            with:
              testing: "${{inputs.testing}}"
              anotherTesting: "${{inputs.anotherTesting}}"
              variable: "${{inputs.variable}}"
              testVar: "${{inputs.testVar}}"
              overlay:
                step:
                  run:
                    shell: <+input>
                    script: <+input>
                    download: <+input>
                  timeout: <+input>
